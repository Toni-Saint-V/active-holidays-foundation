name: Autonomous Product OS Checks

on:
  # GitHub Actions are currently disabled as an automatic merge gate because
  # the account is locked by billing. Keep the workflow manual so PRs do not
  # receive false red checks before a runner can start. Until billing is
  # restored, use `npm run verify:local` and paste the output in the PR.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: Verify autonomous product OS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify autonomous OS
        run: npm run autonomous:verify

      - name: Verify local merge gate
        run: npm run verify

      - name: Verify repo automations
        run: npm run automations:check:all

      - name: Verify repo skills
        run: npm run skills:verify

      - name: Verify YepCode orchestrator tests
        run: npm run yepcode:orchestrator:test

      - name: Verify YepCode orchestrator dry-run
        run: npm run yepcode:orchestrator:dry-run

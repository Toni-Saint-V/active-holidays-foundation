<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura Pass Mobile Reference</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070b13;
        color: #f5ead2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .screen {
        position: relative;
        width: 390px;
        height: 844px;
        overflow: hidden;
        background:
          radial-gradient(circle at 54% 28%, rgba(213, 154, 49, 0.17), transparent 34%),
          radial-gradient(circle at 20% 10%, rgba(92, 51, 72, 0.5), transparent 45%),
          linear-gradient(155deg, #080d17 0%, #11101a 48%, #1a1018 100%);
      }

      .screen::before {
        content: "";
        position: absolute;
        inset: -80px -100px;
        opacity: 0.22;
        background:
          repeating-linear-gradient(95deg, rgba(240, 196, 106, 0.13) 0 1px, transparent 1px 21px),
          repeating-linear-gradient(176deg, rgba(245, 234, 210, 0.08) 0 1px, transparent 1px 26px);
        transform: rotate(-7deg);
      }

      .brand {
        position: absolute;
        top: 18px;
        left: 18px;
        display: flex;
        align-items: center;
        gap: 9px;
        z-index: 3;
        color: rgba(245, 234, 210, 0.9);
        font-size: 13px;
        font-weight: 650;
      }

      .brand-mark {
        width: 10px;
        height: 10px;
        border: 2px solid #d59a31;
        border-radius: 50%;
        box-shadow: 0 0 14px rgba(213, 154, 49, 0.7);
      }

      .top-copy {
        position: relative;
        z-index: 2;
        padding: 78px 20px 0;
      }

      .eyebrow {
        color: #f0c46a;
        font-size: 9px;
        font-weight: 850;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        width: 350px;
        color: #f5ead2;
        font-size: 40px;
        line-height: 0.98;
        letter-spacing: 0;
        font-weight: 900;
      }

      h1 span {
        color: #d99a2d;
      }

      .lead {
        margin: 0;
        width: 320px;
        color: rgba(245, 234, 210, 0.66);
        font-size: 13px;
        line-height: 1.45;
      }

      .passport-cover {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 286px;
        height: 510px;
        border-radius: 30px;
        background:
          radial-gradient(circle at 54% 20%, rgba(240, 196, 106, 0.14), transparent 35%),
          linear-gradient(140deg, rgba(92, 43, 48, 0.7), transparent 48%),
          linear-gradient(160deg, #261522 0%, #15111b 62%, #0b0d14 100%);
        border: 1px solid rgba(240, 196, 106, 0.26);
        box-shadow:
          0 32px 72px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(255, 255, 255, 0.035);
      }

      .passport-cover::before {
        content: "";
        position: absolute;
        inset: 17px;
        border-radius: 23px;
        border: 1px solid rgba(240, 196, 106, 0.17);
        background:
          repeating-radial-gradient(circle at 50% 33%, transparent 0 14px, rgba(240, 196, 106, 0.052) 15px 16px),
          linear-gradient(90deg, transparent, rgba(245, 234, 210, 0.035), transparent);
      }

      .pass {
        position: absolute;
        left: 30px;
        right: 30px;
        top: 309px;
        height: 462px;
        z-index: 2;
        padding: 19px 17px 15px;
        border-radius: 23px;
        background:
          radial-gradient(circle at 80% 16%, rgba(240, 196, 106, 0.14), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 45%),
          rgba(13, 15, 22, 0.78);
        border: 1px solid rgba(240, 196, 106, 0.24);
        box-shadow:
          0 28px 70px rgba(0, 0, 0, 0.48),
          inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        backdrop-filter: blur(12px);
      }

      .pass-top {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .ai {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: rgba(245, 234, 210, 0.86);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .ai::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d59a31;
        box-shadow: 0 0 18px rgba(240, 196, 106, 0.95);
      }

      .pass-label {
        color: #f0c46a;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .travel-pass {
        margin-top: 12px;
        color: rgba(245, 234, 210, 0.56);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .title-row {
        display: grid;
        grid-template-columns: 1fr 92px;
        align-items: end;
        gap: 10px;
        margin-top: 10px;
      }

      .destination {
        font-size: 34px;
        line-height: 0.92;
        letter-spacing: 0;
        font-weight: 950;
      }

      .destination span {
        color: #d99a2d;
      }

      .stamp {
        height: 58px;
        display: grid;
        place-items: center;
        border: 1.2px solid rgba(240, 196, 106, 0.68);
        border-radius: 17px;
        color: rgba(240, 196, 106, 0.9);
        background: rgba(213, 154, 49, 0.035);
        font-size: 12px;
        line-height: 1.02;
        font-weight: 950;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
        transform: rotate(-3deg);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(240, 196, 106, 0.14);
        color: rgba(245, 234, 210, 0.52);
        font-size: 7px;
        font-weight: 850;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .map-card {
        position: relative;
        height: 204px;
        margin-top: 15px;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(240, 196, 106, 0.24);
        background:
          radial-gradient(circle at 54% 48%, rgba(213, 154, 49, 0.12), transparent 38%),
          linear-gradient(145deg, rgba(18, 23, 32, 0.95), rgba(9, 12, 19, 0.99));
      }

      .map-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(245, 234, 210, 0.032) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 234, 210, 0.032) 1px, transparent 1px);
        background-size: 25px 25px;
        mask-image: linear-gradient(180deg, transparent, black 18%, black 82%, transparent);
      }

      .map {
        position: absolute;
        inset: 13px 10px 18px;
        z-index: 1;
        width: calc(100% - 20px);
        height: calc(100% - 31px);
        object-fit: contain;
      }

      .map-status {
        position: absolute;
        left: 14px;
        bottom: 11px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(245, 234, 210, 0.68);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .map-status::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #70d6ff;
        box-shadow: 0 0 14px rgba(112, 214, 255, 0.9);
      }

      .pass-bottom {
        display: grid;
        grid-template-columns: 1fr 64px;
        gap: 12px;
        align-items: center;
        margin-top: 15px;
      }

      .cta {
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: linear-gradient(180deg, #e9a734, #c9851f);
        color: #111018;
        box-shadow: 0 16px 34px rgba(213, 154, 49, 0.24);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .barcode {
        width: 64px;
        height: 34px;
        opacity: 0.84;
        background: repeating-linear-gradient(90deg, #f5ead2 0 2px, transparent 2px 5px, #f5ead2 5px 6px, transparent 6px 9px);
      }

      .serial {
        margin-top: 9px;
        text-align: right;
        color: rgba(245, 234, 210, 0.42);
        font-size: 7px;
        font-weight: 900;
        letter-spacing: 0.28em;
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>Active Holidays</div>
      </div>

      <section class="top-copy">
        <div class="eyebrow">Active Holidays · Aura</div>
        <h1>Поймите маршрут <span>до подачи</span></h1>
        <p class="lead">Тревел-пасс собирает маршрут, документы и визовую готовность в один понятный артефакт.</p>
      </section>

      <div class="passport-cover"></div>

      <section class="pass" aria-label="Digital travel pass">
        <div class="pass-top">
          <div class="ai">AI готов</div>
          <div class="pass-label">Schengen</div>
        </div>
        <div class="travel-pass">Digital Travel Pass</div>

        <div class="title-row">
          <div class="destination">ITALY <span>·</span><br />SCHENGEN</div>
          <div class="stamp">Подача<br />возможна</div>
        </div>

        <div class="meta">
          <span>Italia</span>
          <span>Route clean</span>
        </div>

        <div class="map-card">
          <img class="map" src="./europe-map.svg" alt="Карта Европы с точками внутри контура Шенгена" />
          <div class="map-status">Маршрут проверен</div>
        </div>

        <div class="pass-bottom">
          <div class="cta">Собрать пакет <span>→</span></div>
          <div class="barcode" aria-hidden="true"></div>
        </div>
        <div class="serial">AH · IT · SC24 · 0512</div>
      </section>
    </main>
  </body>
</html>
